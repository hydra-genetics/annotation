name: CI

on:
  push:
    branches:
      - develop
      - master
    paths:
      - "workflow/**"
      - "config/**"
      - ".tests/**"
      - "requirements*.txt"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
  pull_request:
    branches:
      - develop
      - master
    paths:
      - "workflow/**"
      - "config/**"
      - ".tests/**"
      - "requirements*.txt"
      - ".github/workflows/**"
      - ".pre-commit-config.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Linting
        working-directory: .tests/integration
        run: |
          snakemake --lint -n -s ../../workflow/Snakefile --configfile config.yaml

  pycodestyle:
    name: pycodestyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements.test.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements.test.txt
      - name: Check python syntax
        run: pycodestyle --max-line-length=130 --statistics workflow/scripts

  snakefmt:
    name: Snakefmt
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint Code Base
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_SNAKEMAKE_SNAKEFMT: true
          OUTPUT_FOLDER: .github/linters/report

  dry-run:
    name: Snakemake dry run
    runs-on: ubuntu-latest
    needs: [lint, pycodestyle, snakefmt]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Snakemake dry run
        working-directory: .tests/integration
        run: |
          snakemake -n -s ../../workflow/Snakefile --configfile config.yaml

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    needs: [dry-run]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements.test.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements.test.txt
      - name: pytest
        run: pytest workflow/scripts

  integration:
    name: Integration test
    runs-on: ubuntu-latest
    needs: [pytest]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
      - name: Install Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.4.5
      - name: Cache SIMG images
        id: cache-simg
        uses: actions/cache@v4
        with:
          path: ~/singularity_containers
          key: ${{ runner.os }}-simg-${{ hashFiles('config/**/*.yaml', '.tests/integration/*.yaml', 'workflow/Snakefile') }}
          restore-keys: |
            ${{ runner.os }}-simg
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Integration test - small dataset
        working-directory: .tests/integration
        run: |
          mkdir -p ~/singularity_containers
          snakemake -s ../../workflow/Snakefile -j 4 --show-failed-logs \
            --configfile config.yaml \
            --use-singularity \
            --singularity-prefix ~/singularity_containers/ \
            --singularity-args " --cleanenv --bind /home/runner "
